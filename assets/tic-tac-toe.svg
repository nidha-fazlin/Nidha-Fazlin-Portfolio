<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Tic Tac Toe game preview</title>
  <desc id="desc">A neon tic tac toe board with X and O game marks, score chips, and a restart button.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".48" stop-color="#18181b"/>
      <stop offset="1" stop-color="#052e2b"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect width="900" height="560" fill="url(#bg)"/>
  <rect x="96" y="64" width="708" height="432" rx="34" fill="#ffffff" fill-opacity=".08" filter="url(#shadow)"/>
  <rect x="132" y="104" width="260" height="54" rx="27" fill="#ffffff" fill-opacity=".1"/>
  <circle cx="166" cy="131" r="14" fill="#22c55e"/>
  <rect x="192" y="122" width="148" height="18" rx="9" fill="#ffffff" fill-opacity=".72"/>
  <rect x="584" y="104" width="168" height="54" rx="27" fill="#ef4444" fill-opacity=".9"/>
  <rect x="626" y="122" width="84" height="18" rx="9" fill="#ffffff" fill-opacity=".92"/>
  <g transform="translate(226 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="348" height="348" rx="28" fill="#020617"/>
    <g stroke="#38bdf8" stroke-width="10" stroke-linecap="round" filter="url(#glow)">
      <path d="M116 22v304"/>
      <path d="M232 22v304"/>
      <path d="M22 116h304"/>
      <path d="M22 232h304"/>
    </g>
    <g stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <g stroke="#f472b6">
        <path d="M42 42l52 52"/>
        <path d="M94 42L42 94"/>
      </g>
      <circle cx="174" cy="68" r="34" fill="none" stroke="#22c55e"/>
      <g stroke="#f472b6">
        <path d="M254 42l52 52"/>
        <path d="M306 42l-52 52"/>
      </g>
      <circle cx="68" cy="174" r="34" fill="none" stroke="#22c55e"/>
      <g stroke="#f472b6">
        <path d="M148 148l52 52"/>
        <path d="M200 148l-52 52"/>
      </g>
      <circle cx="280" cy="174" r="34" fill="none" stroke="#22c55e"/>
      <g stroke="#f472b6">
        <path d="M42 254l52 52"/>
        <path d="M94 254l-52 52"/>
      </g>
      <circle cx="174" cy="280" r="34" fill="none" stroke="#22c55e"/>
    </g>
  </g>
  <rect x="616" y="212" width="126" height="92" rx="22" fill="#ffffff" fill-opacity=".1"/>
  <rect x="642" y="236" width="74" height="12" rx="6" fill="#ffffff" fill-opacity=".44"/>
  <text x="679" y="282" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#f472b6">X 3</text>
  <rect x="616" y="330" width="126" height="92" rx="22" fill="#ffffff" fill-opacity=".1"/>
  <rect x="642" y="354" width="74" height="12" rx="6" fill="#ffffff" fill-opacity=".44"/>
  <text x="679" y="400" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#22c55e">O 2</text>
</svg>
